[sound_system]

music={
"type": "solo"
}
mode_music={
"type": "solo"
}
effects={
"default": true,
"simultaneous_sounds": 3,
"type": "simultaneous"
}
voice={
"type": "sequential"
}

[keyboard]

1=["event", "s_left_inlane_active"]
2=["event", "s_right_inlane_active"]
3=["event", "s_left_spinner_active"]
4=["switch", "s_trough_ball_4"]
5=["switch", "s_trough_ball_5"]
6=["switch", "s_trough_ball_6"]
enter=["switch", "s_start_button"]
comma=["event", "s_left_flipper_active"]
period=["event", "s_right_flipper_active"]
n=["event", "s_pop_1_active"]
m=["event", "s_pop_2_active"]
h=["event", "start_high_score"]
p=["event", "s_percy_active"]

[logging]

global=10

[mpf]

executable_path="C:\\Users\\twent\\AppData\\Local\\Programs\\Python\\Python312\\Scripts\\mpf.exe"
