coils:
  c_flipper_left_main:
    number: pf-6
    default_pulse_ms: 25
  c_flipper_left_hold:
    number: pf-7
    allow_enable: true
  c_flipper_right_main:
    number: pf-4
    default_pulse_ms: 25
  c_flipper_right_hold:
    number: pf-5
    allow_enable: true

  c_sling_left:
    number: pf-2
  c_sling_right:
    number: pf-1

  c_trough_eject:
    number: pf-0
    default_pulse_ms: 20
  c_auto_plunger:
    number: pf-3
    default_pulse_ms: 30

  c_fldt_dog:
    number: aux-0
    default_pulse_ms: 50
    max_pulse_ms: 100
  c_frdt_pig:
    number: aux-1
    default_pulse_ms: 50
    max_pulse_ms: 100
  c_3_bank_upper:
    number: aux-2
    default_pulse_ms: 50
    max_pulse_ms: 100
  c_bdt:
    number: aux-3
    default_pulse_ms: 50
    max_pulse_ms: 100
