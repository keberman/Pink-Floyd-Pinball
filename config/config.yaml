#config_version=6

hardware:
  platform: fast
  driverboards: fast

machine:
  balls_installed: 1
  min_balls: 1

fast:
  net:
    controller: neuron
    port: auto
    debug: false
    io_loop:
      cab:
        model: FP-I/O-0024
        order: 1
      pf:
        model: FP-I/O-3208
        order: 2
      aux:
        model: FP-I/O-1616
        order: 3

