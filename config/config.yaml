ball_devices:
  bd_trough:
    ball_switches: s_trough_1, s_trough_2, s_trough_3, s_trough_4, s_trough_5, s_trough_6
    jam_switch: s_trough_jam
    eject_coil: c_trough_eject
    eject_targets: bd_shooter_lane
    tags: trough, home, drain
    eject_timeouts: 3s

  bd_shooter_lane:
    ball_switches: s_shooter_lane
    eject_coil: c_auto_plunger
    eject_timeouts: 3s
    eject_targets: playfield
    player_controlled_eject_event: s_launch_button_active
    tags: playfield_active_switch

  bd_vuk:
    ball_switches: s_vuk_opto
    eject_coil: c_vuk
    eject_targets: playfield
    tags: vuk

playfields:
  playfield:
    tags: default
    default_source_device: bd_shooter_lane

flippers:
  left_flipper:
    main_coil: c_flipper_left_main
    hold_coil: c_flipper_left_hold
    activation_switch: s_left_flipper
#    eos_switch: s_eos_left
#    enable_events: machine_reset_phase_3
#    disable_events: service_mode_entered

  right_flipper:
    main_coil: c_flipper_right_main
    hold_coil: c_flipper_right_hold
    activation_switch: s_right_flipper
#    eos_switch: s_eos_right
#    enable_events: machine_reset_phase_3
#    disable_events: service_mode_entered

autofire_coils:
  sling_left:
    coil: c_sling_left
    switch: s_sling_left
    enable_events: ball_started
    coil_overwrite:
      pulse_ms: 5
  sling_right:
    coil: c_sling_right
    switch: s_sling_right
    enable_events: ball_started
    coil_overwrite:
      pulse_ms: 5
  pop_1:
    coil: c_pop_1
    switch: s_pop_1
    enable_events: ball_started
  pop_2:
    coil: c_pop_2
    switch: s_pop_2
    enable_events: ball_started

modes:
  - attract
  - base
  - bike

#coil_player:
#  s_launch_button_active:
#    c_vuk: pulse

event_player:
  init_phase_3: start_mode_attract
  init_done: machine_reset_phase_3

sound_player:
  game_started:
    base_radio:
      bus: music
#  game_ended:
#    base_radio:
#      action: stop

virtual_platform_start_active_switches:
  - s_trough_1
  - s_trough_2
  - s_trough_3
